- Coatis walk with their tails straight up like little flags so their group can follow them.
- A coati’s nose is double-jointed and can rotate upward while sniffing for food.
- Female coatis live in social bands of up to 30 animals.
- Adult male coatis usually live alone and only join groups during mating season.
- Coatis sleep in trees at night to stay safe from predators.
- Baby coatis are called kits and are born in tree nests.
- Coatis belong to the raccoon family.
- Coatis use their long snouts to dig insects out of the ground.
- Coatis are active during the day, unlike raccoons.
- Coatis are extremely curious and investigate almost everything with their noses.