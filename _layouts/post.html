---
layout: default
---

<section class="section">
  <article class="container narrow post-page">
    <a href="{{ '/blog/' | relative_url }}" class="back-link">← Back to blog</a>

    <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>
    <h1>{{ page.title }}</h1>
    <div class="post-body">
      {{ content }}
    </div>
  </article>
</section>
